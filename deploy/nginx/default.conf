# nginx config for the astro-web container.
# Replaces the stock /etc/nginx/conf.d/default.conf.
#
# Serves prerendered static files for everything in dist/client/, and
# reverse-proxies /api/* to the PM2-managed Node SSR process on the host
# (the @astrojs/node standalone server bound to localhost:4321).
#
# Adds:
# - Homepage Link: response headers for agent discovery (RFC 8288)
# - Accept: text/markdown content negotiation backed by static .md companions

map $http_accept $want_md {
    default          0;
    "~*text/markdown" 1;
}

# The Node SSR process runs on the host. Inside the container we reach it
# via host.docker.internal, which requires
# `extra_hosts: ["host.docker.internal:host-gateway"]` in docker-compose.
upstream astro_ssr {
    server host.docker.internal:4321;
    keepalive 16;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Mounted from the host as the parent ./dist/ (not dist/client/) so that
    # rebuilds that recreate dist/client/ don't leave the container holding
    # the old inode of a now-deleted directory. See issue #57.
    root  /usr/share/nginx/html/client;

    # Security / policy headers applied to every response.
    # `always` is required so they apply on non-2xx (e.g. 404) too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Stock nginx:alpine mime.types lacks text/markdown — set it
    # explicitly for .md files so direct fetches and rewrites both
    # carry the correct Content-Type.
    location ~ \.md$ {
        default_type text/markdown;
    }

    # SSR endpoints: reverse-proxy to the Node process. Currently only the
    # tinkering strip API uses this path. Any future server-rendered routes
    # under /api/ get the same handling for free.
    location /api/ {
        proxy_pass http://astro_ssr;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout  10s;
        proxy_connect_timeout 4s;
    }

    # Homepage: advertise discoverable resources via Link headers,
    # and serve /index.md when the client prefers markdown.
    location = / {
        # Nginx's add_header doesn't inherit when a nested block sets one,
        # so the server-level security headers are repeated here.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Link "</sitemap-index.xml>; rel=\"sitemap\", </rss.xml>; rel=\"alternate\"; type=\"application/rss+xml\", </about/>; rel=\"author\", </index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($want_md) {
            rewrite ^ /index.md last;
        }
        try_files /index.html =404;
    }

    location / {
        # Agent prefers markdown? Rewrite trailing-slash URLs to their .md
        # companion (e.g. /about/ -> /about.md, /work/foo/ -> /work/foo.md).
        # Falls through to try_files if no .md exists for that path.
        if ($want_md) {
            rewrite ^(/.+)/$ $1.md last;
        }
        try_files $uri $uri/ $uri.html =404;
        index index.html;
    }

    # Astro builds src/pages/404.astro out to /404.html — serve it when
    # the static build is healthy. If it's missing (mid-rebuild, bad
    # deploy), fall through to the branded fallback below so the
    # default nginx body never reaches a visitor.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        try_files $uri /__branded_error.html;
    }

    # 5xx fallback for the SSR upstream (e.g. systemd restart of
    # jeremyfuksa-ssr drops in-flight /api/* requests) and any other
    # server-side hiccup. Astro doesn't emit a 50x page, so this is
    # the only thing standing between visitors and nginx's default.
    error_page 500 502 503 504 /__branded_error.html;

    # Branded fallback. Served via `alias` from the bind-mounted nginx
    # config dir, not from dist/client/, so it survives `pnpm build`
    # wiping the static root and any failed deploy that leaves it empty.
    location = /__branded_error.html {
        internal;
        default_type text/html;
        alias /etc/nginx/conf.d/branded-error.html;
    }
}
